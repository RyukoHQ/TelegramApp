<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telegram Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      margin: 0;
      background: #f5f5f5;
      color: #222;
    }

    .card {
      max-width: 600px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 24px;
    }

    .row {
      margin: 10px 0;
      padding: 10px;
      background: #f7f7f7;
      border-radius: 10px;
      word-break: break-word;
    }

    button {
      margin-top: 20px;
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 16px;
      cursor: pointer;
      background: #2481cc;
      color: white;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #f7f7f7;
      padding: 12px;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Telegram Mini App</h1>

    <div id="user-info">Загрузка данных пользователя...</div>

    <button id="send-btn">Отправить данные в бота</button>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const userInfoBlock = document.getElementById("user-info");
    const sendBtn = document.getElementById("send-btn");

    // Пользователь, открывший Mini App
    const user = tg.initDataUnsafe?.user || null;

    function renderUser(user) {
      if (!user) {
        userInfoBlock.innerHTML = `
          <div class="row">
            Mini App открыт не из Telegram или Telegram не передал user-данные.
          </div>
        `;
        return;
      }

      userInfoBlock.innerHTML = `
        <div class="row"><b>ID:</b> ${user.id ?? "-"}</div>
        <div class="row"><b>Имя:</b> ${user.first_name ?? "-"}</div>
        <div class="row"><b>Фамилия:</b> ${user.last_name ?? "-"}</div>
        <div class="row"><b>Username:</b> ${user.username ?? "-"}</div>
        <div class="row"><b>Язык:</b> ${user.language_code ?? "-"}</div>
        <div class="row"><b>is_premium:</b> ${user.is_premium ?? false}</div>
      `;
    }

    renderUser(user);

    sendBtn.addEventListener("click", () => {
      const payload = {
        source: "telegram-mini-app",
        action: "send_user_data",
        user: user,
        opened_at: new Date().toISOString()
      };

      tg.sendData(JSON.stringify(payload));
    });
  </script>
</body>
</html>
