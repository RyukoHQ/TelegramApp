<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telegram Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      margin: 0;
      background: #f5f5f5;
      color: #222;
    }

    .card {
      max-width: 800px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 24px;
    }

    .row {
      margin: 10px 0;
      padding: 10px;
      background: #f7f7f7;
      border-radius: 10px;
      word-break: break-word;
    }

    button {
      margin-top: 20px;
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 16px;
      cursor: pointer;
      background: #2481cc;
      color: white;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #f7f7f7;
      padding: 12px;
      border-radius: 12px;
      overflow-x: auto;
      font-size: 13px;
    }

    .title {
      margin-top: 24px;
      margin-bottom: 8px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Telegram Mini App</h1>

    <div class="title">Информация о пользователе</div>
    <div id="user-info">Загрузка...</div>

    <div class="title">Отладка Telegram.WebApp</div>
    <pre id="debug-info">Загрузка...</pre>

    <button id="send-btn">Отправить данные в бота</button>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;

    const userInfoBlock = document.getElementById("user-info");
    const debugInfoBlock = document.getElementById("debug-info");
    const sendBtn = document.getElementById("send-btn");

    if (!tg) {
      userInfoBlock.innerHTML = `
        <div class="row">Telegram WebApp API не найден.</div>
      `;
      debugInfoBlock.textContent = "window.Telegram.WebApp отсутствует";
      throw new Error("Telegram WebApp API not found");
    }

    tg.ready();
    tg.expand();

    const initDataUnsafe = tg.initDataUnsafe || {};
    const initData = tg.initData || "";

    // Пытаемся найти пользователя в нескольких местах
    const detectedUser =
      initDataUnsafe.user ||
      initDataUnsafe.receiver ||
      null;

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function renderUser(user) {
      if (!user) {
        userInfoBlock.innerHTML = `
          <div class="row">
            Пользователь не найден ни в <b>initDataUnsafe.user</b>, ни в <b>initDataUnsafe.receiver</b>.
          </div>
        `;
        return;
      }

      userInfoBlock.innerHTML = `
        <div class="row"><b>ID:</b> ${escapeHtml(user.id ?? "-")}</div>
        <div class="row"><b>Имя:</b> ${escapeHtml(user.first_name ?? "-")}</div>
        <div class="row"><b>Фамилия:</b> ${escapeHtml(user.last_name ?? "-")}</div>
        <div class="row"><b>Username:</b> ${escapeHtml(user.username ?? "-")}</div>
        <div class="row"><b>Язык:</b> ${escapeHtml(user.language_code ?? "-")}</div>
        <div class="row"><b>is_premium:</b> ${escapeHtml(user.is_premium ?? false)}</div>
      `;
    }

    const debugPayload = {
      platform: tg.platform,
      version: tg.version,
      colorScheme: tg.colorScheme,
      initDataPresent: !!initData,
      initDataLength: initData.length,
      initDataUnsafe: initDataUnsafe,
      detectedUser: detectedUser
    };

    renderUser(detectedUser);
    debugInfoBlock.textContent = JSON.stringify(debugPayload, null, 2);

    sendBtn.addEventListener("click", () => {
      const payload = {
        source: "telegram-mini-app",
        action: "send_debug_data",
        detectedUser: detectedUser,
        initDataUnsafe: initDataUnsafe,
        initDataLength: initData.length,
        platform: tg.platform,
        version: tg.version,
        opened_at: new Date().toISOString()
      };

      tg.sendData(JSON.stringify(payload));
    });
  </script>
</body>
</html>
