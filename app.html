<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telegram Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      margin: 0;
      background: #f5f5f5;
      color: #222;
    }

    .card {
      max-width: 850px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 24px;
    }

    .row {
      margin: 10px 0;
      padding: 10px;
      background: #f7f7f7;
      border-radius: 10px;
      word-break: break-word;
    }

    .title {
      margin-top: 24px;
      margin-bottom: 8px;
      font-weight: bold;
      font-size: 18px;
    }

    textarea {
      width: 100%;
      min-height: 100px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 12px;
      padding: 12px;
      font-size: 15px;
      resize: vertical;
    }

    button {
      margin-top: 20px;
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 16px;
      cursor: pointer;
      background: #2481cc;
      color: white;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #f7f7f7;
      padding: 12px;
      border-radius: 12px;
      overflow-x: auto;
      font-size: 13px;
    }

    .status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 12px;
      background: #eef6ff;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Telegram Mini App</h1>

    <div class="title">Информация о пользователе</div>
    <div id="user-info">Загрузка...</div>

    <div class="title">Комментарий</div>
    <textarea id="comment" placeholder="Например: тест отправки данных из Mini App"></textarea>

    <button id="send-btn">Отправить данные в бота</button>

    <div class="status" id="status">Ожидание действия...</div>

    <div class="title">Отладка Telegram.WebApp</div>
    <pre id="debug-info">Загрузка...</pre>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    const userInfoBlock = document.getElementById("user-info");
    const debugInfoBlock = document.getElementById("debug-info");
    const sendBtn = document.getElementById("send-btn");
    const statusBlock = document.getElementById("status");
    const commentInput = document.getElementById("comment");

    // =========================
    // ВАЖНО:
    // ЛОКАЛЬНЫЙ ТЕСТОВЫЙ URL ДЛЯ MAC
    // Если потом перенесёшь backend на сервер —
    // просто замени этот адрес.
    // =========================
    const BACKEND_URL = "http://127.0.0.1:8000/send-to-bot";

    if (!tg) {
      userInfoBlock.innerHTML = `
        <div class="row">Telegram WebApp API не найден.</div>
      `;
      debugInfoBlock.textContent = "window.Telegram.WebApp отсутствует";
      throw new Error("Telegram WebApp API not found");
    }

    tg.ready();
    tg.expand();

    const initDataUnsafe = tg.initDataUnsafe || {};
    const initData = tg.initData || "";
    const detectedUser = initDataUnsafe.user || initDataUnsafe.receiver || null;

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function renderUser(user) {
      if (!user) {
        userInfoBlock.innerHTML = `
          <div class="row">
            Пользователь не найден в Telegram initData.
          </div>
        `;
        return;
      }

      userInfoBlock.innerHTML = `
        <div class="row"><b>ID:</b> ${escapeHtml(user.id ?? "-")}</div>
        <div class="row"><b>Имя:</b> ${escapeHtml(user.first_name ?? "-")}</div>
        <div class="row"><b>Фамилия:</b> ${escapeHtml(user.last_name ?? "-")}</div>
        <div class="row"><b>Username:</b> ${escapeHtml(user.username ?? "-")}</div>
        <div class="row"><b>Язык:</b> ${escapeHtml(user.language_code ?? "-")}</div>
        <div class="row"><b>allows_write_to_pm:</b> ${escapeHtml(user.allows_write_to_pm ?? false)}</div>
      `;
    }

    const debugPayload = {
      platform: tg.platform,
      version: tg.version,
      colorScheme: tg.colorScheme,
      initDataPresent: !!initData,
      initDataLength: initData.length,
      initDataUnsafe: initDataUnsafe,
      detectedUser: detectedUser
    };

    renderUser(detectedUser);
    debugInfoBlock.textContent = JSON.stringify(debugPayload, null, 2);

    async function sendDataToBackend() {
      if (!detectedUser) {
        statusBlock.textContent = "Не удалось отправить: Telegram user не найден.";
        return;
      }

      sendBtn.disabled = true;
      statusBlock.textContent = "Отправка данных в backend...";

      try {
        // ВАЖНО:
        // chat_id берём из Telegram user.id.
        // Для личного чата с ботом этого достаточно:
        // бот отправит сообщение именно этому пользователю.
        const payload = {
          chat_id: detectedUser.id,
          user: detectedUser,
          comment: commentInput.value || "",
          initData: initData
        };

        const response = await fetch(BACKEND_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (!response.ok || !result.ok) {
          throw new Error(result.error || `HTTP ${response.status}`);
        }

        statusBlock.textContent = "Готово: данные отправлены в бота.";
      } catch (err) {
        console.error(err);
        statusBlock.textContent = "Ошибка отправки: " + err.message;
      } finally {
        sendBtn.disabled = false;
      }
    }

    sendBtn.addEventListener("click", sendDataToBackend);
  </script>
</body>
</html>
